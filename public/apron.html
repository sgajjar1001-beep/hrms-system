
<!DOCTYPE html>
<html>
<head>
    <title>Apron Management</title>
</head>
<body>
    <h2>Apron Wash Entry</h2>
    <form id="washForm">
        <input type="number" id="employee_id" placeholder="Employee ID" required><br><br>
        <button type="submit">Mark Wash</button>
    </form>

<script>
document.getElementById('washForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    await fetch('/api/apron/wash', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            employee_id: employee_id.value,
            wash_date: new Date().toISOString().split('T')[0]
        })
    });
    alert("Wash Entry Saved");
});
</script>
</body>
</html>
